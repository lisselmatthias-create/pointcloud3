<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="RD Audio Synth Dual Pointcloud - iPad-ready MP3/MP4 WebGL instrument.">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RD Dual PC">
<title>RD Dual Pointcloud · iPad</title>
<style>
  :root {
    --bg: #111;
    --panel: #1a1a1a;
    --txt: #ddd;
    --acc: #ffaa00;
    --brd: #333;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-text-size-adjust: 100%;
  }

  body {
    background: var(--bg);
    color: var(--txt);
    font-family: system-ui, sans-serif;
    overflow: hidden;
    display: flex;
    height: 100vh;
    height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  canvas {
    flex: 1;
    display: block;
    cursor: crosshair;
    min-width: 0;
    touch-action: none;
  }

  #ui {
    width: 280px;
    background: var(--panel);
    border-left: 1px solid var(--brd);
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 10;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
  }

  h2 {
    font-size: 14px;
    color: var(--acc);
    border-bottom: 1px solid var(--brd);
    padding-bottom: 5px;
  }

  .ctrl {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .value,
  #fps,
  #recordStatus {
    color: var(--acc);
    font-variant-numeric: tabular-nums;
  }

  label {
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: center;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--acc);
  }

  select,
  input[type="file"] {
    width: 100%;
    background: var(--bg);
    color: var(--txt);
    border: 1px solid var(--brd);
    padding: 4px;
    border-radius: 3px;
    font-size: 11px;
  }

  button {
    background: var(--acc);
    color: #000;
    border: none;
    padding: 6px;
    cursor: pointer;
    border-radius: 3px;
    font-weight: bold;
    width: 100%;
    min-height: 34px;
  }

  button.secondary {
    background: #2a2a2a;
    color: var(--txt);
    border: 1px solid var(--brd);
  }

  button.recording {
    background: #f04c4c;
    color: #fff;
  }

  button.active {
    outline: 2px solid var(--acc);
    outline-offset: 1px;
  }

  button:hover {
    opacity: 0.8;
  }

  .meter {
    height: 5px;
    background: #080808;
    border: 1px solid var(--brd);
    border-radius: 3px;
    overflow: hidden;
  }

  .meter span {
    display: block;
    height: 100%;
    width: 0%;
    background: var(--acc);
    transition: width 80ms linear;
  }

  @media (max-width: 900px) {
    body {
      flex-direction: column;
      height: 100dvh;
    }

    canvas {
      min-height: 54dvh;
    }

    #ui {
      width: 100%;
      border-left: 0;
      border-top: 1px solid var(--brd);
      max-height: 46dvh;
    }
  }
</style>
</head>
<body>
<canvas id="glCanvas"></canvas>

<div id="ui">
  <h2>Engine</h2>
  <div class="ctrl">
    <label>Preset <select id="preset"></select></label>
    <div class="row">
      <button id="savePresetBtn" class="secondary">Save Preset</button>
      <button id="deletePresetBtn" class="secondary">Delete</button>
    </div>
    <button id="randomizeBtn" class="secondary">Randomize</button>
    <button id="ipadModeBtn" class="secondary">iPad Dual Pointcloud</button>
    <label>Resolution <select id="res"><option value="256" selected>256</option><option value="512">512</option><option value="1024">1024</option></select></label>
    <label>Sim Steps <span class="value" id="simStepsVal">2</span></label>
    <input type="range" id="simSteps" min="1" max="8" step="1" value="2">
    <label>DPR Limit <select id="dprLimit"><option value="1">1</option><option value="1.5" selected>1.5</option><option value="2">2</option><option value="3">3</option></select></label>
    <label>FPS <span id="fps">--</span></label>
    <button id="resetBtn">Reset Simulation</button>
  </div>

  <h2>Pattern (RD)</h2>
  <div class="ctrl">
    <label>Growth Mode <select id="patternMode">
      <option value="classic">Classic RD</option>
      <option value="labyrinth">Labyrinth</option>
      <option value="spots">Organic Spots</option>
      <option value="soliton">Pulsing Solitons</option>
      <option value="chaos">Boiling Chaos</option>
      <option value="inverted">Inverted Pores</option>
      <option value="worms">Worms & Loops</option>
      <option value="crystal">Crystallization</option>
    </select></label>
    <label>Feed (F) <span class="value" id="feedVal">0.055</span></label>
    <input type="range" id="feed" min="0.01" max="0.08" step="0.001" value="0.055">
    <label>Kill (K) <span class="value" id="killVal">0.062</span></label>
    <input type="range" id="kill" min="0.04" max="0.07" step="0.001" value="0.062">
    <label>Du (Diff U) <span class="value" id="duVal">1.00</span></label>
    <input type="range" id="du" min="0.1" max="1.0" step="0.01" value="1.0">
    <label>Dv (Diff V) <span class="value" id="dvVal">0.50</span></label>
    <input type="range" id="dv" min="0.1" max="1.0" step="0.01" value="0.5">
    <label>Growth Drive <span class="value" id="growthDriveVal">0.50</span></label>
    <input type="range" id="growthDrive" min="0" max="1" step="0.01" value="0.5">
    <label>Pulse Rate <span class="value" id="pulseRateVal">0.35</span></label>
    <input type="range" id="pulseRate" min="0" max="2" step="0.01" value="0.35">
    <label>Edge Gain <span class="value" id="edgeGainVal">1.00</span></label>
    <input type="range" id="edgeGain" min="0" max="3" step="0.01" value="1">
  </div>

  <h2>Flow & Injection</h2>
  <div class="ctrl">
    <label>Flow Curl <span class="value" id="curlVal">0.010</span></label>
    <input type="range" id="curl" min="0.0" max="0.05" step="0.001" value="0.01">
    <label>Brush Size <span class="value" id="brushSizeVal">0.015</span></label>
    <input type="range" id="brushSize" min="0.005" max="0.05" step="0.001" value="0.015">
    <label>Brush Intensity <span class="value" id="brushIntVal">0.50</span></label>
    <input type="range" id="brushInt" min="0.1" max="1.0" step="0.01" value="0.5">
  </div>

  <h2>Audio Reactivity</h2>
  <div class="ctrl">
    <label>Audio File <input type="file" id="audioFile" accept=".mp3,.m4a,.aac,.wav,audio/*"></label>
    <label>Bass Influence <span class="value" id="bassInfVal">0.65</span></label>
    <input type="range" id="bassInf" min="0" max="2" step="0.01" value="0.65">
    <label>Mid Influence <span class="value" id="midInfVal">0.35</span></label>
    <input type="range" id="midInf" min="0" max="2" step="0.01" value="0.35">
    <label>High Influence <span class="value" id="highInfVal">0.55</span></label>
    <input type="range" id="highInf" min="0" max="2" step="0.01" value="0.55">
    <label>Beat Influence <span class="value" id="beatInfVal">0.85</span></label>
    <input type="range" id="beatInf" min="0" max="2" step="0.01" value="0.85">
    <label>Smoothing <span class="value" id="smoothingVal">0.82</span></label>
    <input type="range" id="smoothing" min="0" max="0.95" step="0.01" value="0.82">
    <label>Bass</label><div class="meter"><span id="bassMeter"></span></div>
    <label>Mid</label><div class="meter"><span id="midMeter"></span></div>
    <label>High</label><div class="meter"><span id="highMeter"></span></div>
    <audio id="audioPlayer" controls style="width:100%; display:none; margin-top:5px;"></audio>
  </div>

  <h2>Export</h2>
  <div class="ctrl">
    <button id="screenshotBtn" class="secondary">Screenshot PNG</button>
    <button id="recordBtn">Start Recording</button>
    <label>Status <span id="recordStatus">idle</span></label>
  </div>

  <h2>Media Influence</h2>
  <div class="ctrl">
    <label>Image/Video <input type="file" id="mediaFile" accept=".mp4,.mov,.m4v,.webm,image/*,video/*"></label>
    <div class="row">
      <button id="mediaPlayBtn" class="secondary">Play/Pause</button>
      <button id="mediaRestartBtn" class="secondary">Restart</button>
    </div>
    <div class="row">
      <button id="flipYBtn" class="secondary">Flip V</button>
      <button id="flipXBtn" class="secondary">Flip H</button>
    </div>
    <label>Video Speed <span class="value" id="videoSpeedVal">1.00</span></label>
    <input type="range" id="videoSpeed" min="0.1" max="3" step="0.05" value="1">
    <label>Media Bias <span class="value" id="mediaBiasVal">0.010</span></label>
    <input type="range" id="mediaBias" min="0" max="0.1" step="0.001" value="0.01">
    <label>Status <span id="mediaStatus">none</span></label>
  </div>

  <h2>Color</h2>
  <div class="ctrl">
    <label>Palette <select id="palette">
      <option value="aurora">Aurora</option>
      <option value="ember">Ember</option>
      <option value="acid">Acid</option>
      <option value="ocean">Ocean</option>
      <option value="mono">Mono</option>
    </select></label>
    <label>Hue Shift <span class="value" id="hueShiftVal">0.00</span></label>
    <input type="range" id="hueShift" min="-1" max="1" step="0.01" value="0">
    <label>Saturation <span class="value" id="saturationVal">1.00</span></label>
    <input type="range" id="saturation" min="0" max="2" step="0.01" value="1">
    <label>Contrast <span class="value" id="contrastVal">1.00</span></label>
    <input type="range" id="contrast" min="0.4" max="2.2" step="0.01" value="1">
    <label>Brightness <span class="value" id="brightnessVal">0.00</span></label>
    <input type="range" id="brightness" min="-0.35" max="0.35" step="0.01" value="0">
  </div>

  <h2>Pointcloud</h2>
  <div class="ctrl">
    <label>Render <select id="renderMode">
      <option value="flat">Flat</option>
      <option value="pointcloud">Pointcloud</option>
      <option value="flatcloud">Flat Capture Cloud</option>
      <option value="hybrid">Hybrid</option>
    </select></label>
    <label>Mouse Tool <select id="mouseTool">
      <option value="orbit">3D Orbit</option>
      <option value="brush">RD Brush</option>
    </select></label>
    <label>Depth Analysis <select id="depthMode">
      <option value="chemical">Chemical V</option>
      <option value="edge">Edge Gradient</option>
      <option value="differential">U minus V</option>
      <option value="media">Media Luminance</option>
      <option value="radial">Radial Topology</option>
      <option value="audio">Audio Lift</option>
    </select></label>
    <label>Motion Preset <select id="motionPreset">
      <option value="still">Still</option>
      <option value="orbit">Slow Orbit</option>
      <option value="wave">Wave Scan</option>
      <option value="tunnel">Tunnel Pull</option>
      <option value="explode">Beat Burst</option>
      <option value="drift">Audio Drift</option>
    </select></label>
    <label>Deform Pattern <select id="deformMode">
      <option value="none">None</option>
      <option value="ripple">Radial Ripple</option>
      <option value="twist">Twist Field</option>
      <option value="spiral">Spiral Fold</option>
      <option value="terrain">Terrain Folds</option>
      <option value="vortex">Vortex Pull</option>
      <option value="sphere">Sphere Wrap</option>
      <option value="scan">Scan Waves</option>
      <option value="scatter">Particle Scatter</option>
    </select></label>
    <label>Color Source <select id="pcColorSource">
      <option value="flat">Flat Capture</option>
      <option value="depth">Depth</option>
      <option value="edge">Edges</option>
      <option value="media">Media</option>
      <option value="audio">Audio Energy</option>
    </select></label>
    <label>Density <select id="pointDensity">
      <option value="64">64 x 64</option>
      <option value="96">96 x 96</option>
      <option value="128" selected>128 x 128</option>
      <option value="192">192 x 192</option>
      <option value="256">256 x 256</option>
      <option value="320">320 x 320</option>
      <option value="384">384 x 384</option>
    </select></label>
    <label>Depth Scale <span class="value" id="pcDepthScaleVal">0.85</span></label>
    <input type="range" id="pcDepthScale" min="0" max="2.5" step="0.01" value="0.85">
    <label>Point Size <span class="value" id="pcPointSizeVal">2.20</span></label>
    <input type="range" id="pcPointSize" min="0.4" max="8" step="0.1" value="2.2">
    <label>Point Alpha <span class="value" id="pcPointAlphaVal">0.82</span></label>
    <input type="range" id="pcPointAlpha" min="0.05" max="1" step="0.01" value="0.82">
    <label>Spread <span class="value" id="pcSpreadVal">1.55</span></label>
    <input type="range" id="pcSpread" min="0.5" max="3" step="0.01" value="1.55">
    <label>Perspective <span class="value" id="pcPerspectiveVal">1.35</span></label>
    <input type="range" id="pcPerspective" min="0.4" max="3" step="0.01" value="1.35">
    <label>Motion Amount <span class="value" id="pcMotionAmountVal">0.45</span></label>
    <input type="range" id="pcMotionAmount" min="0" max="2" step="0.01" value="0.45">
    <label>Auto Rotate <span class="value" id="pcAutoRotateVal">0.18</span></label>
    <input type="range" id="pcAutoRotate" min="-1" max="1" step="0.01" value="0.18">
    <label>Camera Zoom <span class="value" id="pcZoomVal">2.25</span></label>
    <input type="range" id="pcZoom" min="1.2" max="5" step="0.01" value="2.25">
    <label>Deform Amount <span class="value" id="pcDeformAmountVal">0.45</span></label>
    <input type="range" id="pcDeformAmount" min="0" max="2" step="0.01" value="0.45">
    <label>Deform Frequency <span class="value" id="pcDeformFreqVal">8.00</span></label>
    <input type="range" id="pcDeformFreq" min="1" max="32" step="0.1" value="8">
    <label>Deform Speed <span class="value" id="pcDeformSpeedVal">0.75</span></label>
    <input type="range" id="pcDeformSpeed" min="-3" max="3" step="0.01" value="0.75">
    <label>Noise Scatter <span class="value" id="pcNoiseVal">0.04</span></label>
    <input type="range" id="pcNoise" min="0" max="0.5" step="0.01" value="0.04">
    <label>Point Roundness <span class="value" id="pcRoundnessVal">0.38</span></label>
    <input type="range" id="pcRoundness" min="0.05" max="0.5" step="0.01" value="0.38">
    <label>Audio Size <span class="value" id="pcSizeAudioVal">0.35</span></label>
    <input type="range" id="pcSizeAudio" min="0" max="2" step="0.01" value="0.35">
    <label>Visibility Cut <span class="value" id="pcVisibilityCutVal">0.00</span></label>
    <input type="range" id="pcVisibilityCut" min="0" max="1" step="0.01" value="0">
    <label>Performance Guard <select id="pcPerfGuard">
      <option value="on" selected>On</option>
      <option value="off">Off</option>
    </select></label>
    <label>Perf <span id="perfStatus">ok</span></label>
  </div>

  <h2>Pointcloud 2</h2>
  <div class="ctrl">
    <label>Layer <select id="p2Enabled"><option value="off">Off</option><option value="on">On</option></select></label>
    <label>Source <select id="p2Source">
      <option value="flat">Flat</option>
      <option value="video">Video</option>
      <option value="pattern">Pattern</option>
    </select></label>
    <label>Density <select id="p2Density">
      <option value="48">48 x 48</option>
      <option value="64">64 x 64</option>
      <option value="96" selected>96 x 96</option>
      <option value="128">128 x 128</option>
      <option value="192">192 x 192</option>
      <option value="256">256 x 256</option>
      <option value="320">320 x 320</option>
    </select></label>
    <label>Deform <select id="p2DeformMode">
      <option value="none">None</option>
      <option value="ripple">Radial Ripple</option>
      <option value="twist">Twist Field</option>
      <option value="spiral">Spiral Fold</option>
      <option value="terrain">Terrain Folds</option>
      <option value="vortex">Vortex Pull</option>
      <option value="sphere">Sphere Wrap</option>
      <option value="scan">Scan Waves</option>
      <option value="scatter">Particle Scatter</option>
    </select></label>
    <label>Motion <select id="p2MotionPreset">
      <option value="still">Still</option>
      <option value="orbit">Slow Orbit</option>
      <option value="wave">Wave Scan</option>
      <option value="tunnel">Tunnel Pull</option>
      <option value="explode">Beat Burst</option>
      <option value="drift">Audio Drift</option>
    </select></label>
    <label>Color Source <select id="p2ColorSource">
      <option value="flat">Flat Capture</option>
      <option value="depth">Depth</option>
      <option value="edge">Edges</option>
      <option value="media">Media</option>
      <option value="audio">Audio Energy</option>
    </select></label>
    <label>Pos X <span class="value" id="p2XVal">0.00</span></label>
    <input type="range" id="p2X" min="-2" max="2" step="0.01" value="0">
    <label>Pos Y <span class="value" id="p2YVal">0.00</span></label>
    <input type="range" id="p2Y" min="-2" max="2" step="0.01" value="0">
    <label>Pos Z <span class="value" id="p2ZVal">0.20</span></label>
    <input type="range" id="p2Z" min="-2" max="2" step="0.01" value="0.2">
    <label>Rot X <span class="value" id="p2RotXVal">0.00</span></label>
    <input type="range" id="p2RotX" min="-3.14" max="3.14" step="0.01" value="0">
    <label>Rot Y <span class="value" id="p2RotYVal">0.00</span></label>
    <input type="range" id="p2RotY" min="-3.14" max="3.14" step="0.01" value="0">
    <label>Rot Z <span class="value" id="p2RotZVal">0.00</span></label>
    <input type="range" id="p2RotZ" min="-3.14" max="3.14" step="0.01" value="0">
    <label>Scale X <span class="value" id="p2ScaleXVal">1.00</span></label>
    <input type="range" id="p2ScaleX" min="0.1" max="3" step="0.01" value="1">
    <label>Scale Y <span class="value" id="p2ScaleYVal">1.00</span></label>
    <input type="range" id="p2ScaleY" min="0.1" max="3" step="0.01" value="1">
    <label>Scale Z <span class="value" id="p2ScaleZVal">1.00</span></label>
    <input type="range" id="p2ScaleZ" min="0.1" max="3" step="0.01" value="1">
    <label>Depth <span class="value" id="p2DepthScaleVal">0.70</span></label>
    <input type="range" id="p2DepthScale" min="0" max="2.5" step="0.01" value="0.7">
    <label>Point Size <span class="value" id="p2PointSizeVal">1.80</span></label>
    <input type="range" id="p2PointSize" min="0.3" max="8" step="0.1" value="1.8">
    <label>Alpha <span class="value" id="p2AlphaVal">0.65</span></label>
    <input type="range" id="p2Alpha" min="0.03" max="1" step="0.01" value="0.65">
    <label>Spread <span class="value" id="p2SpreadVal">1.25</span></label>
    <input type="range" id="p2Spread" min="0.2" max="3" step="0.01" value="1.25">
    <label>Perspective <span class="value" id="p2PerspectiveVal">1.20</span></label>
    <input type="range" id="p2Perspective" min="0.3" max="3" step="0.01" value="1.2">
    <label>Motion Amount <span class="value" id="p2MotionAmountVal">0.35</span></label>
    <input type="range" id="p2MotionAmount" min="0" max="2" step="0.01" value="0.35">
    <label>Deform Amount <span class="value" id="p2DeformAmountVal">0.45</span></label>
    <input type="range" id="p2DeformAmount" min="0" max="2" step="0.01" value="0.45">
    <label>Deform Frequency <span class="value" id="p2DeformFreqVal">9.00</span></label>
    <input type="range" id="p2DeformFreq" min="1" max="32" step="0.1" value="9">
    <label>Deform Speed <span class="value" id="p2DeformSpeedVal">0.60</span></label>
    <input type="range" id="p2DeformSpeed" min="-3" max="3" step="0.01" value="0.6">
    <label>Noise <span class="value" id="p2NoiseVal">0.03</span></label>
    <input type="range" id="p2Noise" min="0" max="0.5" step="0.01" value="0.03">
    <label>Roundness <span class="value" id="p2RoundnessVal">0.34</span></label>
    <input type="range" id="p2Roundness" min="0.05" max="0.5" step="0.01" value="0.34">
    <label>Visibility Cut <span class="value" id="p2VisibilityCutVal">0.00</span></label>
    <input type="range" id="p2VisibilityCut" min="0" max="1" step="0.01" value="0">
  </div>

  <h2>Cloud Coupling</h2>
  <div class="ctrl">
    <label>Shared Video <select id="pcSharedVideo">
      <option value="off">Off</option>
      <option value="on">Both Use Video</option>
    </select></label>
    <label>Spatial Layout <select id="pcSpatialLayout">
      <option value="manual">Manual</option>
      <option value="p1front">Cloud 1 Front</option>
      <option value="p2front">Cloud 2 Front</option>
      <option value="sandwich">Front / Middle / Back</option>
      <option value="cross">Cross Depth</option>
      <option value="orbitstack">Orbit Stack</option>
    </select></label>
    <label>Partner Motion <select id="pcPartnerMotion">

const fsSim = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

uniform sampler2D u_state;
uniform sampler2D u_media;
uniform vec2 u_res;
uniform float u_feed, u_kill, u_du, u_dv, u_dt;
uniform float u_curl, u_bass, u_mid, u_high, u_beat, u_time, u_mode, u_growthDrive, u_pulseRate, u_mouseDown, u_mediaBias, u_mediaFlipX, u_mediaFlipY;
uniform vec2 u_mouse;
uniform float u_brushSize, u_brushInt;

vec2 hash22(vec2 p) {
    p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));
    return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
}

vec2 curl(vec2 p, float t) {
    float e = 0.1;
    float n = sin(p.x * 2.0 + t) * cos(p.y * 3.0 + t * 0.7) * 0.5;
    float nR = sin((p.x + e) * 2.0 + t) * cos(p.y * 3.0 + t * 0.7) * 0.5;
    float nU = sin(p.x * 2.0 + t) * cos((p.y + e) * 3.0 + t * 0.7) * 0.5;
    return vec2(nU - n, nR - n) / e;
}

float edgeFactor(float v) {
    return smoothstep(0.18, 0.82, abs(v - 0.5) * 2.0);
}

void main() {
    vec2 tx = 1.0 / u_res;
    vec4 c = texture(u_state, v_uv);
    float U = c.r;
    float V = c.g;

    float lU = -U;
    float lV = -V;
    for (float y = -1.0; y <= 1.0; y += 1.0) {
        for (float x = -1.0; x <= 1.0; x += 1.0) {
            if (x == 0.0 && y == 0.0) continue;
            vec2 nUv = v_uv + vec2(x, y) * tx;
            vec4 n = texture(u_state, nUv);
            float w = (abs(x) + abs(y) == 1.0) ? 0.2 : 0.05;

    float mode = floor(u_mode + 0.5);
    vec2 flow = curl(v_uv * 5.0, u_time * 0.35) * u_curl;
    flow += curl(v_uv * 11.0 + u_mid, u_time * 0.7) * u_mid * 0.006;
    flow += hash22(v_uv * 100.0 + u_time) * u_high * 0.015;
    if (mode == 3.0) flow += curl(v_uv * 18.0, u_time * 1.8) * 0.004 * u_growthDrive;
    if (mode == 4.0) flow += hash22(v_uv * 260.0 + u_time * 3.0) * 0.018 * u_growthDrive;
    if (mode == 6.0) flow += vec2(sin(v_uv.y * 45.0 + u_time), cos(v_uv.x * 31.0 - u_time)) * 0.0025 * u_growthDrive;
    if (mode == 7.0) flow += normalize(vec2(v_uv.x - 0.5, v_uv.y - 0.5) + vec2(0.001)) * 0.0015 * u_growthDrive;

    vec2 advUv = v_uv - flow * tx;
    vec4 adv = texture(u_state, advUv);
    U = mix(U, adv.r, 0.8);
    V = mix(V, adv.g, 0.8);

    float v2 = V * V;
    float reaction = U * v2;
    float pulse = 0.5 + 0.5 * sin(u_time * 6.28318 * u_pulseRate + V * 8.0);
    float feed = u_feed + u_bass * 0.008 + u_beat * 0.014;
    float kill = u_kill + u_high * 0.004 - u_mid * 0.003;
    if (mode == 0.0) { feed += (pulse - 0.5) * 0.001 * u_growthDrive; }
    if (mode == 1.0) { feed -= edgeFactor(V) * 0.0015; kill -= 0.001 * u_growthDrive; }
    if (mode == 2.0) { feed -= 0.002 * u_growthDrive; kill += 0.0015 * u_growthDrive; }
    if (mode == 3.0) { feed += (pulse - 0.5) * 0.012 * u_growthDrive; kill += (0.5 - pulse) * 0.006 * u_growthDrive; }
    if (mode == 4.0) { feed += hash22(v_uv * 95.0 + u_time).x * 0.004 * u_growthDrive; kill += hash22(v_uv * 121.0 - u_time).y * 0.004 * u_growthDrive; }
    if (mode == 5.0) { feed += 0.004 * u_growthDrive; kill -= 0.002 * u_growthDrive; }
    if (mode == 6.0) { feed += sin(v_uv.x * 24.0 + u_time) * 0.0015 * u_growthDrive; kill += cos(v_uv.y * 18.0 - u_time) * 0.001 * u_growthDrive; }
    if (mode == 7.0) { feed -= 0.002 * u_growthDrive; kill -= edgeFactor(V) * 0.0025; }
    U += (u_du * lU - reaction + feed * (1.0 - U)) * u_dt;
    V += (u_dv * lV + reaction - (kill + feed) * V) * u_dt;

    V += u_bass * 0.035 + u_beat * 0.08;
    if (mode == 3.0) V += pulse * 0.018 * u_growthDrive;
    if (mode == 4.0) V += hash22(v_uv * 300.0 + u_time * 4.0).x * 0.018 * u_growthDrive;
    if (mode == 5.0) V = mix(V, 1.0 - V, 0.08 * u_growthDrive);
    if (mode == 7.0) V += max(0.0, 0.55 - distance(v_uv, vec2(0.5))) * 0.002 * u_growthDrive;

        if (u_mediaFlipX > 0.5) mediaUv.x = 1.0 - mediaUv.x;
        if (u_mediaFlipY > 0.5) mediaUv.y = 1.0 - mediaUv.y;
        vec3 m = texture(u_media, mediaUv).rgb;
        float lum = dot(m, vec3(0.299, 0.587, 0.114));
        V += (lum - 0.5) * u_mediaBias;

    if (u_mouseDown > 0.5) {
        float d = distance(v_uv, u_mouse);
        if (d < u_brushSize) {

            V += mask * u_brushInt;
            U -= mask * u_brushInt * 0.5;
        }
    }

    U = clamp(U, 0.0, 1.0);
    V = clamp(V, 0.0, 1.0);
    fragColor = vec4(U, V, 0.0, 1.0);
}`;

const fsRender = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

uniform sampler2D u_state;
uniform vec2 u_res;
uniform float u_bass, u_mid, u_high, u_beat, u_mode, u_edgeGain;
uniform float u_palette, u_hueShift, u_saturation, u_contrast, u_brightness;

vec3 palette(float t, float p) {
    if (p == 1.0) {
        return vec3(0.08, 0.02, 0.0) + vec3(1.0, 0.28, 0.04) * smoothstep(0.0, 1.0, t);
    }
    if (p == 2.0) {
        return 0.5 + 0.5 * cos(6.28318 * (vec3(1.0, 0.78, 0.42) * t + vec3(0.05, 0.42, 0.72)));
    }
    if (p == 3.0) {
        return 0.5 + 0.5 * cos(6.28318 * (vec3(0.82, 1.0, 1.2) * t + vec3(0.58, 0.42, 0.22)));
    }
    if (p == 4.0) {
        float g = smoothstep(0.0, 1.0, t);
        return vec3(g);
    }
    vec3 a = vec3(0.5, 0.5, 0.5);
    vec3 b = vec3(0.5, 0.5, 0.5);
    vec3 c = vec3(1.0, 1.0, 1.0);
    vec3 d = vec3(0.263, 0.416, 0.557);
    return a + b * cos(6.28318 * (c * t + d));
}

vec3 colorGrade(vec3 col) {
    float angle = u_hueShift * 3.14159265;
    vec3 axis = normalize(vec3(1.0));
    col = col * cos(angle) + cross(axis, col) * sin(angle) + axis * dot(axis, col) * (1.0 - cos(angle));
    float luma = dot(col, vec3(0.299, 0.587, 0.114));
    col = mix(vec3(luma), col, u_saturation);
    col = (col - 0.5) * u_contrast + 0.5 + u_brightness;
    return clamp(col, 0.0, 1.0);
}

void main() {
    vec2 tx = 1.0 / u_res;
    vec4 c = texture(u_state, v_uv);
    float V = c.g;

    float Vl = texture(u_state, v_uv - vec2(tx.x, 0.0)).g;
    float Vr = texture(u_state, v_uv + vec2(tx.x, 0.0)).g;
    float Vt = texture(u_state, v_uv + vec2(0.0, tx.y)).g;
    float Vb = texture(u_state, v_uv - vec2(0.0, tx.y)).g;
    float edge = length(vec2(Vr - Vl, Vt - Vb)) * u_edgeGain;

    vec3 col = palette(V * 1.5 + 0.2, floor(u_palette + 0.5));
    col += edge * vec3(0.8, 0.4, 0.1) * 3.0;
    col += vec3(0.14, 0.04, 0.0) * u_bass;
    col += vec3(0.0, 0.05, 0.12) * u_mid;
    col += edge * vec3(0.1, 0.4, 0.6) * u_high;
    col = mix(col, vec3(1.0, 0.72, 0.22), u_beat * 0.18);
    float mode = floor(u_mode + 0.5);
    if (mode == 2.0) col = mix(col, vec3(0.95, 0.72, 0.25), smoothstep(0.42, 0.72, V) * 0.35);
    if (mode == 3.0) col += vec3(0.22, 0.08, 0.28) * sin(V * 18.0 + u_bass * 4.0);
    if (mode == 4.0) col = mix(col, vec3(1.0, 0.15, 0.02), edge * 0.35);
    if (mode == 5.0) col = vec3(1.0) - col * 0.82;
    if (mode == 7.0) col = mix(col, vec3(0.72, 0.95, 1.0), edge * 0.28);

    fragColor = vec4(colorGrade(col), 1.0);
}`;

const vsPoint = `#version 300 es
precision highp float;
in vec2 a_uv;
uniform sampler2D u_state;
uniform sampler2D u_media;
uniform vec2 u_res;
uniform float u_time, u_depthMode, u_motionPreset;

float hash(vec2 p) {
    return fract(sin(dot(p, vec2(41.17, 289.23))) * 45758.5453);
}

vec3 rotateX(vec3 p, float a) {
    float s = sin(a), c = cos(a);
    return vec3(p.x, p.y * c - p.z * s, p.y * s + p.z * c);
}

vec3 rotateY(vec3 p, float a) {
    float s = sin(a), c = cos(a);
    return vec3(p.x * c + p.z * s, p.y, -p.x * s + p.z * c);
}

vec3 rotateZ(vec3 p, float a) {
    float s = sin(a), c = cos(a);
    return vec3(p.x * c - p.y * s, p.x * s + p.y * c, p.z);

void main() {
    vec2 tx = 1.0 / u_res;

    float U = c.r;
    float V = c.g;
    float Vl = texture(u_state, a_uv - vec2(tx.x, 0.0)).g;
    float Vr = texture(u_state, a_uv + vec2(tx.x, 0.0)).g;
    float Vt = texture(u_state, a_uv + vec2(0.0, tx.y)).g;
    float Vb = texture(u_state, a_uv - vec2(0.0, tx.y)).g;
    float edge = length(vec2(Vr - Vl, Vt - Vb)) * 8.0;

    if (u_mediaFlipY > 0.5) mediaUv.y = 1.0 - mediaUv.y;
    vec3 m = texture(u_media, mediaUv).rgb;
    float mediaLum = dot(m, vec3(0.299, 0.587, 0.114));
    float radial = 1.0 - smoothstep(0.0, 0.72, distance(a_uv, vec2(0.5)));
    float mode = floor(u_depthMode + 0.5);
    float source = floor(u_layerSource + 0.5);
    float depth = V;
    if (mode == 1.0) depth = edge;
    if (mode == 2.0) depth = clamp((U - V) * 0.9 + 0.5, 0.0, 1.0);
    if (mode == 3.0) depth = mediaLum;
    if (mode == 4.0) depth = radial * (0.35 + V);
    if (mode == 5.0) depth = V + u_bass * 0.45 + u_beat * 0.75;
    if (source == 1.0) depth = mediaLum;
    if (source == 2.0) depth = mix(edge, V, 0.35);

    vec2 p2 = (a_uv - 0.5) * u_spread;
    float t = u_time;
    float motion = floor(u_motionPreset + 0.5);
    float deform = floor(u_deformMode + 0.5);
    float jitter = hash(a_uv * 300.0) - 0.5;
    if (motion == 2.0) depth += sin((p2.x + p2.y) * 10.0 + t * 2.2) * 0.12 * u_motionAmount;
    if (motion == 3.0) p2 *= 1.0 + radial * sin(t * 1.4) * 0.22 * u_motionAmount;
    if (motion == 4.0) p2 += normalize(p2 + vec2(0.001)) * u_beat * 0.32 * u_motionAmount;
    if (motion == 5.0) p2 += vec2(sin(t + p2.y * 8.0), cos(t * 0.7 + p2.x * 9.0)) * u_mid * 0.16 * u_motionAmount;

    float localTime = t * u_deformSpeed;
    float angle = atan(p2.y, p2.x);
    float radius = length(p2);
    if (deform == 1.0) depth += sin(radius * u_deformFreq - localTime * 2.0) * 0.12 * u_deformAmount;
    if (deform == 2.0) p2 = rotateZ(vec3(p2, 0.0), (depth - 0.5) * u_deformAmount * 2.8 + radius * 0.7).xy;
    if (deform == 3.0) p2 = rotateZ(vec3(p2, 0.0), angle * 0.18 * u_deformAmount + radius * u_deformFreq * 0.08).xy;
    if (deform == 4.0) depth += sin(p2.x * u_deformFreq + localTime) * cos(p2.y * u_deformFreq * 0.7 - localTime) * 0.14 * u_deformAmount;
    if (deform == 5.0) p2 += vec2(-p2.y, p2.x) / max(radius, 0.08) * radial * 0.05 * u_deformAmount;
    if (deform == 6.0) depth += sqrt(max(0.0, 1.0 - min(radius * radius, 1.0))) * 0.55 * u_deformAmount;
    if (deform == 7.0) p2.y += sin(p2.x * u_deformFreq + localTime * 2.0) * 0.08 * u_deformAmount;
    if (deform == 8.0) p2 += vec2(hash(a_uv * 500.0 + t), hash(a_uv * 700.0 - t)) * u_deformAmount * 0.08 - u_deformAmount * 0.04;

    float scatter = jitter * (u_noiseAmount + u_high * 0.08);
    vec3 p = vec3(p2 + scatter * 0.08, (depth - 0.5) * u_depthScale + scatter);
    p = rotateX(p, u_layerRot.x);
    p = rotateY(p, u_layerRot.y);
    p = rotateZ(p, u_layerRot.z);
    p = p * u_layerScale + u_layerOffset;
    p = rotateX(p, u_rotX);
    p = rotateY(p, u_rotY + t * u_autoRotate + (motion == 1.0 ? t * 0.18 * u_motionAmount : 0.0));
    p = rotateZ(p, u_rotZ);

    float z = max(0.2, u_zoom - p.z);
    float persp = u_perspective / z;
    gl_Position = vec4(p.x * persp, p.y * persp, (p.z + 1.0) / u_zoom, 1.0);
    gl_PointSize = max(0.4, u_pointSize * persp * (1.0 + edge * 0.35 + u_beat * u_sizeAudio));
    v_value = V;
    v_u = U;
    v_edge = edge;
    v_depth = depth;
    v_media = mediaLum;
    v_radial = radial;
    if (depth < u_visibilityCut) {
        gl_Position = vec4(2.0, 2.0, 2.0, 1.0);
        gl_PointSize = 0.0;
    }
}`;

const fsPoint = `#version 300 es

function compileShader(type, source) {

    const message = gl.getShaderInfoLog(shader);
    console.error("Shader compile error:", message);

    throw new Error(message || "Shader compile failed");

}

function createEmptyMediaTexture() {

}

function initFBOs() {
  for (let i = 0; i < 2; i += 1) {
    if (tex[i]) gl.deleteTexture(tex[i]);
    if (fbo[i]) gl.deleteFramebuffer(fbo[i]);

    tex[i] = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex[i]);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, simW, simH, 0, gl.RGBA, gl.HALF_FLOAT, null);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, stateFilter);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, stateFilter);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);

    fbo[i] = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo[i]);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex[i], 0);
    const status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
    if (status !== gl.FRAMEBUFFER_COMPLETE) {
      throw new Error(`Framebuffer incomplete: ${status}`);
    }
  }
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}

function bindQuad(program, attr) {
  gl.useProgram(program);
  gl.bindBuffer(gl.ARRAY_BUFFER, vb);
  gl.enableVertexAttribArray(attr);
  gl.vertexAttribPointer(attr, 2, gl.FLOAT, false, 0, 0);
}

function buildPointCloudBuffer(density, buffer) {
  const data = new Float32Array(density * density * 2);
  let index = 0;
  for (let y = 0; y < density; y += 1) {
    for (let x = 0; x < density; x += 1) {
      data[index++] = density === 1 ? 0.5 : x / (density - 1);
      data[index++] = density === 1 ? 0.5 : y / (density - 1);
    }
  }
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
  return density * density;
}

function rebuildPointCloud() {
  pointCount = buildPointCloudBuffer(pointDensity, pointBuffer);
}

function rebuildPointCloud2() {
  point2Count = buildPointCloudBuffer(point2Density, point2Buffer);
}

function bindPointCloud(buffer = pointBuffer) {

}

}

function formatParam(id, value) {
  return Number(value).toFixed(valueDecimals[id] ?? 2);
}

function updateValueLabel(id) {
  const label = document.getElementById(`${id}Val`);
  if (label) label.textContent = formatParam(id, params[id]);
}

function setParam(id, value) {
  if (!(id in params)) return;
  if (stringParamKeys.includes(id)) {
    params[id] = value;
  } else if (boolParamKeys.includes(id)) {
    params[id] = value === true || value === "true" || value === 1;
  } else {
    params[id] = parseFloat(value);
  }
  const el = document.getElementById(id);
  if (el) el.value = params[id];
  updateValueLabel(id);
  syncPresetUi(id);
}

function syncPresetUi(id) {
  if (id === "flipX" || id === "flipY") {
    flipXBtn.classList.toggle("active", params.flipX);
    flipYBtn.classList.toggle("active", params.flipY);
  }
  if (id === "videoSpeed" && mediaElement && mediaElement.tagName === "VIDEO") {
    mediaElement.playbackRate = params.videoSpeed;
  }
  if (id === "pointDensity") {
    pointDensity = parseInt(params.pointDensity, 10);
    rebuildPointCloud();
  }
  if (id === "p2Density") {
    point2Density = parseInt(params.p2Density, 10);
    rebuildPointCloud2();
  }
  if (id === "pcZoom") {
    orbit.zoom = params.pcZoom;
  }
  if (["pointDensity", "p2Density", "renderMode", "p2Enabled", "pcPerfGuard"].includes(id)) {
    enforcePointBudget("settings");
  }
}

function activePointTotal() {
  const first = params.renderMode !== "flat" ? pointDensity * pointDensity : 0;
  const second = params.p2Enabled === "on" ? point2Density * point2Density : 0;
  return first + second;
}

function previousDensity(value, minValue) {
  const steps = ["48", "64", "96", "128", "192", "256", "320", "384"];
  const index = steps.indexOf(String(value));
  const minIndex = steps.indexOf(String(minValue));
  return index > minIndex ? steps[index - 1] : String(value);
}

function enforcePointBudget(reason = "budget") {
  if (!perfStatus) return;
  if (params.pcPerfGuard !== "on") {
    perfStatus.textContent = `${Math.round(activePointTotal() / 1000)}k guard off`;
    return;
  }
  if (perfGuardBusy) return;

  perfGuardBusy = true;
  const maxPoints = reason === "fps" ? 120000 : 180000;
  let changed = false;

  while (activePointTotal() > maxPoints) {
    if (params.p2Enabled === "on" && parseInt(params.p2Density, 10) > 96) {
      const next = previousDensity(params.p2Density, 96);
      if (next === params.p2Density) break;
      setParam("p2Density", next);
      changed = true;
      continue;
    }
    if (params.renderMode !== "flat" && parseInt(params.pointDensity, 10) > 128) {
      const next = previousDensity(params.pointDensity, 128);
      if (next === params.pointDensity) break;
      setParam("pointDensity", next);
      changed = true;
      continue;
    }
    break;
  }

  const totalK = Math.round(activePointTotal() / 1000);
  perfStatus.textContent = changed ? `${totalK}k guarded ${reason}` : `${totalK}k ok`;
  perfGuardBusy = false;
}

function applyPreset(preset, shouldReset = true, includeDefaults = true) {
  const mergedPreset = includeDefaults ? { ...defaultParams, ...preset } : preset;
  Object.keys(mergedPreset).forEach((key) => {
    setParam(key, mergedPreset[key]);
  });
  if (shouldReset) resetSim();
}

function snapshotPreset() {
  return paramKeys.reduce((preset, key) => {
    preset[key] = params[key];
    return preset;
  }, {});
}

  const sweetGroup = document.createElement("optgroup");
  sweetGroup.label = "Sweet Spots";
  Object.keys({ ...sweetPresets, ...pointcloudPresets }).forEach((name) => {
    const opt = document.createElement("option");
    opt.value = `sweet:${name}`;
    opt.textContent = name;
    sweetGroup.appendChild(opt);
  });
  presetSel.appendChild(sweetGroup);

  const builtinGroup = document.createElement("optgroup");
  builtinGroup.label = "Factory";
  Object.keys(presets).forEach((name) => {
    const opt = document.createElement("option");
    opt.value = `factory:${name}`;
    opt.textContent = name;
    builtinGroup.appendChild(opt);
  });
  presetSel.appendChild(builtinGroup);

  const customNames = Object.keys(customPresets).sort((a, b) => a.localeCompare(b));
  if (customNames.length) {
    const customGroup = document.createElement("optgroup");
    customGroup.label = "Custom";
    customNames.forEach((name) => {
      const opt = document.createElement("option");
      opt.value = `custom:${name}`;
      opt.textContent = name;
      customGroup.appendChild(opt);
    });
    presetSel.appendChild(customGroup);
  }

  presetSel.value = selectedValue;
}

function getMouseUV(event) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (event.clientX - rect.left) / rect.width,
    y: 1.0 - (event.clientY - rect.top) / rect.height
  };
}

function shouldOrbit(event) {
  return params.mouseTool === "orbit" && params.renderMode !== "flat" && !event.shiftKey;
}

canvas.addEventListener("pointerdown", (event) => {
  canvas.setPointerCapture?.(event.pointerId);
  if (shouldOrbit(event)) {
    orbit.active = true;
    orbit.lastX = event.clientX;
    orbit.lastY = event.clientY;
  } else {
    mouse.down = true;
    Object.assign(mouse, getMouseUV(event));
  }
  event.preventDefault();
}, { passive: false });

canvas.addEventListener("pointermove", (event) => {
  if (orbit.active) {
    const dx = event.clientX - orbit.lastX;
    const dy = event.clientY - orbit.lastY;
    orbit.rotY += dx * 0.006;
    orbit.rotX = Math.max(-1.45, Math.min(1.45, orbit.rotX + dy * 0.006));
    orbit.lastX = event.clientX;
    orbit.lastY = event.clientY;
  } else {
    Object.assign(mouse, getMouseUV(event));
  }
  if (mouse.down || orbit.active) event.preventDefault();
}, { passive: false });

const endPointerInput = (event) => {
  mouse.down = false;
  orbit.active = false;
  if (event && typeof event.pointerId !== "undefined") {
    canvas.releasePointerCapture?.(event.pointerId);
  }
};
window.addEventListener("pointerup", endPointerInput);
canvas.addEventListener("pointercancel", endPointerInput);
canvas.addEventListener("pointerleave", endPointerInput);

canvas.onwheel = (event) => {

  const nextZoom = Math.max(1.2, Math.min(5, params.pcZoom + event.deltaY * 0.002));

};

document.getElementById("audioFile").onchange = async (event) => {
  const file = event.target.files[0];
  if (!file) return;
  const looksAudio = file.type.startsWith("audio/") || /\.(mp3|m4a|aac|wav)$/i.test(file.name);
  if (!looksAudio) {
    console.warn("Unsupported audio file:", file.name);
    return;
  }

  if (audioObjectUrl) URL.revokeObjectURL(audioObjectUrl);
  audioObjectUrl = URL.createObjectURL(file);
  audioPlayer.src = audioObjectUrl;
  audioPlayer.style.display = "block";

  if (!audioCtx) {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) {
      console.warn("Web Audio is not supported in this browser.");
      return;
    }
    audioCtx = new AudioCtx();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = params.smoothing;
    recordDestination = audioCtx.createMediaStreamDestination();
    audioSource = audioCtx.createMediaElementSource(audioPlayer);
    audioSource.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.connect(recordDestination);
  }

  if (audioCtx.state === "suspended") {
    await audioCtx.resume();
  }

  try {
    await audioPlayer.play();
  } catch (error) {
    console.warn("Audio playback requires user gesture:", error);
  }
};

function processAudio() {
  if (!analyser) return;

  analyser.smoothingTimeConstant = params.smoothing;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  const averageBand = (from, to) => {
    let sum = 0;
    const end = Math.min(to, data.length);
    for (let i = from; i < end; i += 1) sum += data[i];
    return sum / Math.max(end - from, 1) / 255;
  };

  const bass = averageBand(1, 10);
  const mid = averageBand(10, 45);
  const high = averageBand(45, data.length);
  const energy = bass * 0.55 + mid * 0.3 + high * 0.15;
  const follow = 1.0 - params.smoothing;

  audioData.bass += (bass - audioData.bass) * follow;
  audioData.mid += (mid - audioData.mid) * follow;
  audioData.high += (high - audioData.high) * follow;
  audioData.slowEnergy += (energy - audioData.slowEnergy) * 0.025;
  const beatTarget = energy > audioData.slowEnergy * 1.28 && energy > 0.12 ? Math.min((energy - audioData.slowEnergy) * 3.0, 1.0) : 0;
  audioData.beat = Math.max(beatTarget, audioData.beat * 0.88);
  audioData.energy = energy;

  meters.bass.style.width = `${Math.min(audioData.bass * 100, 100)}%`;
  meters.mid.style.width = `${Math.min(audioData.mid * 100, 100)}%`;
  meters.high.style.width = `${Math.min(audioData.high * 100, 100)}%`;
}

function stopMediaUpdates() {
  if (mediaRaf) {
    cancelAnimationFrame(mediaRaf);
    mediaRaf = 0;
  }
  if (mediaElement && mediaElement.tagName === "VIDEO") {
    mediaElement.pause();
  }
  if (mediaObjectUrl) {
    URL.revokeObjectURL(mediaObjectUrl);
    mediaObjectUrl = "";
  }
  mediaElement = null;
  mediaStatus.textContent = "none";
}

function startVideoUpdates(video) {
  const update = () => {
    if (video.readyState >= 2 && !video.paused && !video.ended) {
      gl.bindTexture(gl.TEXTURE_2D, mediaTex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);
    }
    mediaRaf = requestAnimationFrame(update);
  };
  update();
}

document.getElementById("mediaFile").onchange = (event) => {
  const file = event.target.files[0];
  if (!file) return;
  const isVideoFile = file.type.startsWith("video") || /\.(mp4|mov|m4v|webm)$/i.test(file.name);
  const isImageFile = file.type.startsWith("image");
  if (!isVideoFile && !isImageFile) {
    mediaStatus.textContent = "unsupported";
    return;
  }

  stopMediaUpdates();

  if (mediaTex) gl.deleteTexture(mediaTex);
  mediaTex = gl.createTexture();

  const isVideo = isVideoFile;
  mediaObjectUrl = URL.createObjectURL(file);
  const el = isVideo ? document.createElement("video") : new Image();
  mediaElement = el;

  if (isVideo) {
    el.muted = true;
    el.loop = true;
    el.playsInline = true;
    el.setAttribute("playsinline", "");
    el.setAttribute("webkit-playsinline", "");
    el.preload = "auto";
    el.playbackRate = params.videoSpeed;
    el.src = mediaObjectUrl;
    mediaStatus.textContent = "video loading";
  } else {
    el.src = mediaObjectUrl;
    mediaStatus.textContent = "image loading";
  }

  const uploadFrame = () => {
    gl.bindTexture(gl.TEXTURE_2D, mediaTex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, el);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  };

  if (isVideo) {
    el.onloadeddata = async () => {
      try {
        await el.play();
      } catch (error) {
        console.warn("Video playback could not start automatically:", error);
      }
      uploadFrame();
      startVideoUpdates(el);
      mediaStatus.textContent = el.paused ? "video ready" : "video playing";
    };
  } else {
    el.onload = () => {
      uploadFrame();
      mediaStatus.textContent = "image ready";
    };
  }
};

let mediaRecorder;
let recordedChunks = [];
const recordBtn = document.getElementById("recordBtn");
const recordStatus = document.getElementById("recordStatus");

function timestampName(prefix, ext) {
  const stamp = new Date().toISOString().replace(/[:.]/g, "-");
  return `${prefix}-${stamp}.${ext}`;
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

document.getElementById("screenshotBtn").onclick = () => {
  canvas.toBlob((blob) => {
    if (!blob) return;
    downloadBlob(blob, timestampName("rd-audio-synth", "png"));
  }, "image/png");
};

function isAppleTouchDevice() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}

function bestRecorderMime(hasAudio) {
  const safariFirst = hasAudio
    ? ["video/mp4;codecs=avc1.42E01E,mp4a.40.2", "video/mp4", "video/webm;codecs=vp8,opus", "video/webm"]
    : ["video/mp4;codecs=avc1.42E01E", "video/mp4", "video/webm;codecs=vp8", "video/webm"];
  const chromeFirst = hasAudio
    ? ["video/webm;codecs=vp9,opus", "video/webm;codecs=vp8,opus", "video/webm", "video/mp4"]
    : ["video/webm;codecs=vp9", "video/webm;codecs=vp8", "video/webm", "video/mp4"];
  const options = isAppleTouchDevice() ? safariFirst : chromeFirst;
  return options.find((type) => MediaRecorder.isTypeSupported(type)) || "";
}

function startRecording() {
  if (!canvas.captureStream || typeof MediaRecorder === "undefined") {
    recordStatus.textContent = "unsupported";
    return;
  }

  const stream = canvas.captureStream(isAppleTouchDevice() ? 30 : 60);
  const hasAudio = Boolean(recordDestination);
  if (recordDestination) {
    recordDestination.stream.getAudioTracks().forEach((track) => stream.addTrack(track));
  }

  recordedChunks = [];
  const mimeType = bestRecorderMime(hasAudio);
  mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
  mediaRecorder.ondataavailable = (event) => {
    if (event.data.size > 0) recordedChunks.push(event.data);
  };
  mediaRecorder.onstop = () => {
    stream.getVideoTracks().forEach((track) => track.stop());
    const type = mimeType || "video/webm";
    const ext = type.includes("mp4") ? "mp4" : "webm";
    const blob = new Blob(recordedChunks, { type });
    downloadBlob(blob, timestampName("rd-dual-pointcloud-recording", ext));
    recordStatus.textContent = "saved";
  };
  mediaRecorder.start();
  recordBtn.textContent = "Stop Recording";
  recordBtn.classList.add("recording");
  recordStatus.textContent = recordDestination ? "recording A/V" : "recording video";
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  }
  recordBtn.textContent = "Start Recording";
  recordBtn.classList.remove("recording");
}

recordBtn.onclick = () => {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    stopRecording();
  } else {
    startRecording();
  }
};

let current = 0;
const dt = 1.0;
const startTime = performance.now();
let simSteps = 2;
let dprLimit = 1.5;
let fpsFrames = 0;
let fpsLast = performance.now();
const fpsEl = document.getElementById("fps");

function resizeCanvas() {
  const ratio = Math.min(window.devicePixelRatio || 1, dprLimit);
  canvas.width = Math.floor(canvas.clientWidth * ratio);
  canvas.height = Math.floor(canvas.clientHeight * ratio);
}

document.getElementById("simSteps").oninput = (event) => {
  simSteps = parseInt(event.target.value, 10);
  document.getElementById("simStepsVal").textContent = simSteps;
};

document.getElementById("dprLimit").onchange = (event) => {
  dprLimit = parseFloat(event.target.value);
  resizeCanvas();
};

function setSimUniforms() {
  gl.uniform2f(loc.sim.u_res, simW, simH);
  gl.uniform1f(loc.sim.u_feed, params.feed);
  gl.uniform1f(loc.sim.u_kill, params.kill);
  gl.uniform1f(loc.sim.u_du, params.du);
  gl.uniform1f(loc.sim.u_dv, params.dv);
  gl.uniform1f(loc.sim.u_dt, dt);
  gl.uniform1f(loc.sim.u_curl, params.curl);
  gl.uniform1f(loc.sim.u_bass, audioData.bass * params.bassInf);
  gl.uniform1f(loc.sim.u_mid, audioData.mid * params.midInf);
  gl.uniform1f(loc.sim.u_high, audioData.high * params.highInf);
  gl.uniform1f(loc.sim.u_beat, audioData.beat * params.beatInf);
  gl.uniform1f(loc.sim.u_time, (performance.now() - startTime) * 0.001);
  gl.uniform1f(loc.sim.u_mode, Math.max(modeIds.indexOf(params.patternMode), 0));
  gl.uniform1f(loc.sim.u_growthDrive, params.growthDrive);
  gl.uniform1f(loc.sim.u_pulseRate, params.pulseRate);
  gl.uniform1f(loc.sim.u_mouseDown, mouse.down ? 1.0 : 0.0);
  gl.uniform2f(loc.sim.u_mouse, mouse.x, mouse.y);
  gl.uniform1f(loc.sim.u_brushSize, params.brushSize);
  gl.uniform1f(loc.sim.u_brushInt, params.brushInt);
  gl.uniform1f(loc.sim.u_mediaBias, params.mediaBias);
  gl.uniform1f(loc.sim.u_mediaFlipX, params.flipX ? 1.0 : 0.0);
  gl.uniform1f(loc.sim.u_mediaFlipY, params.flipY ? 1.0 : 0.0);
}

function simulationStep() {
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo[1 - current]);
  gl.viewport(0, 0, simW, simH);
  bindQuad(progSim, posAttrSim);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex[current]);
  gl.uniform1i(loc.sim.u_state, 0);

  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, mediaTex || emptyMediaTex);
  gl.uniform1i(loc.sim.u_media, 1);

  setSimUniforms();
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  current = 1 - current;
}

canvas.addEventListener("webglcontextlost", (event) => {
  event.preventDefault();
  recordStatus.textContent = "webgl lost";
});

canvas.addEventListener("webglcontextrestored", () => {
  location.reload();
});

window.addEventListener("beforeunload", () => {
  if (audioObjectUrl) URL.revokeObjectURL(audioObjectUrl);
  stopMediaUpdates();
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
});

window.onresize = resizeCanvas;
resizeCanvas();
createEmptyMediaTexture();
rebuildPointCloud();
rebuildPointCloud2();
initFBOs();
resetSim();

function makePointLayerConfig(overrides = {}) {
  return {
    depthMode: params.depthMode,
    motionPreset: params.motionPreset,
    deformMode: params.deformMode,
    colorSource: params.pcColorSource,
    source: "flat",
    depthScale: params.pcDepthScale,
    spread: params.pcSpread,
    pointSize: params.pcPointSize,
    perspective: params.pcPerspective,
    motionAmount: params.pcMotionAmount,
    autoRotate: params.pcAutoRotate,
    zoom: params.pcZoom,
    sizeAudio: params.pcSizeAudio,
    visibilityCut: params.pcVisibilityCut,
    deformAmount: params.pcDeformAmount,
    deformFreq: params.pcDeformFreq,
    deformSpeed: params.pcDeformSpeed,
    noise: params.pcNoise,
    alpha: params.pcPointAlpha,
    roundness: params.pcRoundness,
    offset: [0, 0, 0],
    scale: [1, 1, 1],
    layerRot: [0, 0, 0],
    orbit,
    ...overrides
  };
}

function addVec3(a, b) {
  return [a[0] + b[0], a[1] + b[1], a[2] + b[2]];
}

function mixVec3(a, b, amount) {
  return [
    a[0] * (1 - amount) + b[0] * amount,
    a[1] * (1 - amount) + b[1] * amount,
    a[2] * (1 - amount) + b[2] * amount
  ];
}

function getCoupledPointConfigs() {
  const time = (performance.now() - startTime) * 0.001;
  const sep = params.pcDepthSeparation;
  const center = params.pcCenterBias;
  const amount = params.pcPartnerAmount;

  const p1 = makePointLayerConfig();
  const p2 = makePointLayerConfig({
    source: params.p2Source,
    depthMode: params.p2Source === "video" ? "media" : params.p2Source === "pattern" ? "edge" : "chemical",
    motionPreset: params.p2MotionPreset,
    deformMode: params.p2DeformMode,
    colorSource: params.p2ColorSource,
    depthScale: params.p2DepthScale,
    spread: params.p2Spread,
    pointSize: params.p2PointSize,
    perspective: params.p2Perspective,
    motionAmount: params.p2MotionAmount,
    autoRotate: params.pcAutoRotate * 0.5,
    zoom: params.pcZoom,
    sizeAudio: params.pcSizeAudio,
    visibilityCut: params.p2VisibilityCut,
    deformAmount: params.p2DeformAmount,
    deformFreq: params.p2DeformFreq,
    deformSpeed: params.p2DeformSpeed,
    noise: params.p2Noise,
    alpha: params.p2Alpha,
    roundness: params.p2Roundness,
    offset: [params.p2X, params.p2Y, params.p2Z],
    scale: [params.p2ScaleX, params.p2ScaleY, params.p2ScaleZ],
    layerRot: [params.p2RotX, params.p2RotY, params.p2RotZ]
  });

  if (params.pcSharedVideo === "on") {
    p1.source = "video";
    p1.depthMode = "media";
    p1.colorSource = "media";
    p2.source = "video";
    p2.depthMode = "media";
    p2.colorSource = "media";
  }

  if (params.pcSpatialLayout === "p1front") {
    p1.offset = addVec3(p1.offset, [0, 0, sep]);
    p2.offset = addVec3(p2.offset, [0, 0, -sep]);
  } else if (params.pcSpatialLayout === "p2front") {
    p1.offset = addVec3(p1.offset, [0, 0, -sep]);
    p2.offset = addVec3(p2.offset, [0, 0, sep]);
  } else if (params.pcSpatialLayout === "sandwich") {
    p1.offset = addVec3(mixVec3(p1.offset, [0, 0, sep], center), [0, 0, sep * 0.35]);
    p2.offset = addVec3(mixVec3(p2.offset, [0, 0, -sep], center), [0, 0, -sep * 0.35]);
  } else if (params.pcSpatialLayout === "cross") {
    p1.offset = addVec3(p1.offset, [-sep * 0.38, 0, sep * 0.45]);
    p2.offset = addVec3(p2.offset, [sep * 0.38, 0, -sep * 0.45]);
    p1.layerRot = addVec3(p1.layerRot, [0, 0.18, -0.12]);
    p2.layerRot = addVec3(p2.layerRot, [0, -0.18, 0.12]);
  } else if (params.pcSpatialLayout === "orbitstack") {
    p1.offset = addVec3(p1.offset, [Math.sin(time * 0.35) * sep * 0.45, 0, Math.cos(time * 0.35) * sep]);
    p2.offset = addVec3(p2.offset, [Math.sin(time * 0.35 + Math.PI) * sep * 0.45, 0, Math.cos(time * 0.35 + Math.PI) * sep]);
  }

  if (params.pcPartnerMotion === "mirror") {
    p2.layerRot = [-p1.layerRot[0] + params.p2RotX, -p1.layerRot[1] + params.p2RotY, p1.layerRot[2] + params.p2RotZ];
    p2.offset = addVec3(p2.offset, [-p1.offset[0] * amount, p1.offset[1] * amount, -p1.offset[2] * amount]);
  } else if (params.pcPartnerMotion === "chase") {
    const chase = [Math.sin(time * 0.8) * amount * 0.25, Math.cos(time * 0.55) * amount * 0.18, Math.sin(time * 0.4) * amount * 0.35];
    p2.offset = addVec3(p2.offset, chase);
    p2.layerRot = addVec3(p2.layerRot, [chase[1], chase[0], time * 0.08 * amount]);
  } else if (params.pcPartnerMotion === "counter") {
    p1.autoRotate += amount * 0.18;
    p2.autoRotate -= amount * 0.18;
    p2.layerRot = addVec3(p2.layerRot, [0, time * -0.25 * amount, time * 0.08 * amount]);
  } else if (params.pcPartnerMotion === "breathe") {
    const breath = 1 + Math.sin(time * 1.2) * amount * 0.12;
    p1.scale = p1.scale.map((v) => v * breath);
    p2.scale = p2.scale.map((v) => v * (2 - breath));
    p1.offset = addVec3(p1.offset, [0, 0, Math.sin(time * 1.2) * sep * 0.18]);
    p2.offset = addVec3(p2.offset, [0, 0, -Math.sin(time * 1.2) * sep * 0.18]);
  } else if (params.pcPartnerMotion === "weave") {
    p1.offset = addVec3(p1.offset, [Math.sin(time) * amount * 0.2, Math.cos(time * 0.7) * amount * 0.14, Math.sin(time * 0.9) * sep * 0.35]);
    p2.offset = addVec3(p2.offset, [Math.sin(time + Math.PI) * amount * 0.2, Math.cos(time * 0.7 + Math.PI) * amount * 0.14, Math.sin(time * 0.9 + Math.PI) * sep * 0.35]);
  }

  return { p1, p2 };
}

function setPointUniforms(config = makePointLayerConfig()) {
  const time = (performance.now() - startTime) * 0.001;
  gl.uniform2f(loc.point.u_res, simW, simH);
  gl.uniform1f(loc.point.u_time, time);
  gl.uniform1f(loc.point.u_depthMode, Math.max(depthModeIds.indexOf(config.depthMode), 0));
  gl.uniform1f(loc.point.u_motionPreset, Math.max(motionPresetIds.indexOf(config.motionPreset), 0));
  gl.uniform1f(loc.point.u_deformMode, Math.max(deformModeIds.indexOf(config.deformMode), 0));
  gl.uniform1f(loc.point.u_deformAmount, config.deformAmount);
  gl.uniform1f(loc.point.u_deformFreq, config.deformFreq);
  gl.uniform1f(loc.point.u_deformSpeed, config.deformSpeed);
  gl.uniform1f(loc.point.u_noiseAmount, config.noise);
  gl.uniform1f(loc.point.u_depthScale, config.depthScale);
  gl.uniform1f(loc.point.u_spread, config.spread);
  gl.uniform1f(loc.point.u_pointSize, config.pointSize);
  gl.uniform1f(loc.point.u_perspective, config.perspective);
  gl.uniform1f(loc.point.u_motionAmount, config.motionAmount);
  gl.uniform1f(loc.point.u_autoRotate, config.autoRotate);
  gl.uniform1f(loc.point.u_zoom, config.zoom);
  gl.uniform1f(loc.point.u_sizeAudio, config.sizeAudio);
  gl.uniform1f(loc.point.u_visibilityCut, config.visibilityCut);
  gl.uniform1f(loc.point.u_layerSource, Math.max(layerSourceIds.indexOf(config.source), 0));
  gl.uniform1f(loc.point.u_rotX, config.orbit.rotX);
  gl.uniform1f(loc.point.u_rotY, config.orbit.rotY);
  gl.uniform1f(loc.point.u_rotZ, config.orbit.rotZ);
  gl.uniform3f(loc.point.u_layerOffset, config.offset[0], config.offset[1], config.offset[2]);
  gl.uniform3f(loc.point.u_layerScale, config.scale[0], config.scale[1], config.scale[2]);
  gl.uniform3f(loc.point.u_layerRot, config.layerRot[0], config.layerRot[1], config.layerRot[2]);
  gl.uniform1f(loc.point.u_bass, audioData.bass * params.bassInf);
  gl.uniform1f(loc.point.u_mid, audioData.mid * params.midInf);
  gl.uniform1f(loc.point.u_high, audioData.high * params.highInf);
  gl.uniform1f(loc.point.u_beat, audioData.beat * params.beatInf);
  gl.uniform1f(loc.point.u_mediaFlipX, params.flipX ? 1.0 : 0.0);
  gl.uniform1f(loc.point.u_mediaFlipY, params.flipY ? 1.0 : 0.0);
  gl.uniform1f(loc.point.u_palette, Math.max(paletteIds.indexOf(params.palette), 0));
  gl.uniform1f(loc.point.u_hueShift, params.hueShift);
  gl.uniform1f(loc.point.u_saturation, params.saturation);
  gl.uniform1f(loc.point.u_contrast, params.contrast);
  gl.uniform1f(loc.point.u_brightness, params.brightness);
  gl.uniform1f(loc.point.u_alpha, config.alpha);
  gl.uniform1f(loc.point.u_colorSource, Math.max(colorSourceIds.indexOf(config.colorSource), 0));
  gl.uniform1f(loc.point.u_roundness, config.roundness);
}

function renderPointCloud(buffer = pointBuffer, count = pointCount, config = makePointLayerConfig()) {
  bindPointCloud(buffer);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex[current]);
  gl.uniform1i(loc.point.u_state, 0);

  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, mediaTex || emptyMediaTex);
  gl.uniform1i(loc.point.u_media, 1);

  setPointUniforms(config);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.enable(gl.DEPTH_TEST);
  gl.depthMask(false);
  gl.drawArrays(gl.POINTS, 0, count);
  gl.depthMask(true);
  gl.disable(gl.DEPTH_TEST);
  gl.disable(gl.BLEND);
}

function render() {
  processAudio();

  for (let i = 0; i < simSteps; i += 1) {
    simulationStep();
  }

  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  const coupledConfigs = getCoupledPointConfigs();

  if (params.renderMode !== "pointcloud" && params.renderMode !== "flatcloud") {
    bindQuad(progRender, posAttrRen);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, tex[current]);
    gl.uniform1i(loc.ren.u_state, 0);
    gl.uniform2f(loc.ren.u_res, simW, simH);
    gl.uniform1f(loc.ren.u_bass, audioData.bass * params.bassInf);
    gl.uniform1f(loc.ren.u_mid, audioData.mid * params.midInf);
    gl.uniform1f(loc.ren.u_high, audioData.high * params.highInf);
    gl.uniform1f(loc.ren.u_beat, audioData.beat * params.beatInf);
    gl.uniform1f(loc.ren.u_mode, Math.max(modeIds.indexOf(params.patternMode), 0));
    gl.uniform1f(loc.ren.u_edgeGain, params.edgeGain);
    gl.uniform1f(loc.ren.u_palette, Math.max(paletteIds.indexOf(params.palette), 0));
    gl.uniform1f(loc.ren.u_hueShift, params.hueShift);
    gl.uniform1f(loc.ren.u_saturation, params.saturation);
    gl.uniform1f(loc.ren.u_contrast, params.contrast);
    gl.uniform1f(loc.ren.u_brightness, params.brightness);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  if (params.renderMode !== "flat") {
    renderPointCloud(pointBuffer, pointCount, coupledConfigs.p1);
  }

  if (params.p2Enabled === "on") {
    renderPointCloud(point2Buffer, point2Count, coupledConfigs.p2);
  }

  fpsFrames += 1;
  const now = performance.now();
  if (now - fpsLast > 500) {
    const fps = Math.round((fpsFrames * 1000) / (now - fpsLast));
    fpsEl.textContent = fps;
    if (params.pcPerfGuard === "on" && activePointTotal() > 120000) {
      lowFpsHits = fps < 28 ? lowFpsHits + 1 : 0;
      if (lowFpsHits >= 3) {
        enforcePointBudget("fps");
        lowFpsHits = 0;
      }
    }
    fpsFrames = 0;
    fpsLast = now;
  }

  requestAnimationFrame(render);
}

render();
</script>
